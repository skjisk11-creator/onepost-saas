<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePost Pro - Premium Social Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; overflow-x: hidden; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .grad-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
        .grad-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); border-color: rgba(129, 140, 248, 0.5); background: rgba(255, 255, 255, 0.05); }
        .active-card { background: rgba(129, 140, 248, 0.1) !important; border-color: #818cf8 !important; }
        .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.2; z-index: -1; }
    </style>
</head>
<body class="min-h-screen">
    <div class="blob w-[500px] h-[500px] grad-bg top-[-10%] left-[-10%]"></div>
    <div class="blob w-[400px] h-[400px] grad-bg bottom-[-10%] right-[-10%]"></div>

    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 grad-bg rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fas fa-paper-plane text-white"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter">One<span class="grad-text">Post</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div class="glass px-4 py-2 rounded-full text-xs font-bold border-indigo-500/30 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> SYSTEM LIVE
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-8">
            <div class="space-y-2">
                <h1 class="text-5xl font-extrabold tracking-tight">Post Everywhere in <span class="grad-text">One Click.</span></h1>
                <p class="text-slate-400 text-lg">The ultimate command center for your social presence.</p>
            </div>

            <div class="glass p-8 rounded-[2rem] space-y-6">
                <textarea id="postText" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl p-6 text-xl min-h-[250px] focus:outline-none focus:border-indigo-500/50 transition-all placeholder:text-slate-600" placeholder="Type your masterpiece here..."></textarea>
                
                <div class="flex flex-wrap gap-4">
                    <button class="flex-1 py-4 rounded-2xl grad-bg font-bold text-lg shadow-xl shadow-indigo-500/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group" id="publishBtn">
                        <i class="fas fa-bolt group-hover:scale-125 transition-transform"></i>
                        <span>Blast to 0 Platforms</span>
                    </button>
                    <button class="px-6 py-4 rounded-2xl glass font-bold hover:bg-white/5 transition-all">
                        <i class="fas fa-magic grad-text"></i>
                    </button>
                </div>
            </div>

            <div class="glass rounded-[2rem] p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg">Transmission Status</h3>
                    <span class="text-[10px] font-black tracking-widest text-slate-500">REAL-TIME SYNC</span>
                </div>
                <div id="logs" class="space-y-3">
                    <div class="text-center py-6 text-slate-500 italic text-sm">Awaiting your command...</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-xl">Channels</h3>
                <span class="text-xs font-bold text-indigo-400">ACTIVE</span>
            </div>

            <div class="grid gap-4">
                <div onclick="toggle(this)" class="channel-card glass p-5 rounded-2xl flex items-center gap-4 cursor-pointer card-hover border-transparent">
                    <div class="w-12 h-12 rounded-xl bg-slate-900 flex items-center justify-center text-xl"><i class="fab fa-twitter"></i></div>
                    <div class="flex-1 font-bold text-sm">Twitter / X</div>
                    <div class="dot w-2 h-2 rounded-full bg-slate-700"></div>
                </div>
                <div onclick="toggle(this)" class="channel-card glass p-5 rounded-2xl flex items-center gap-4 cursor-pointer card-hover border-transparent">
                    <div class="w-12 h-12 rounded-xl bg-slate-900 flex items-center justify-center text-xl text-pink-500"><i class="fab fa-instagram"></i></div>
                    <div class="flex-1 font-bold text-sm">Instagram</div>
                    <div class="dot w-2 h-2 rounded-full bg-slate-700"></div>
                </div>
                <div onclick="toggle(this)" class="channel-card glass p-5 rounded-2xl flex items-center gap-4 cursor-pointer card-hover border-transparent">
                    <div class="w-12 h-12 rounded-xl bg-slate-900 flex items-center justify-center text-xl text-blue-500"><i class="fab fa-linkedin"></i></div>
                    <div class="flex-1 font-bold text-sm">LinkedIn</div>
                    <div class="dot w-2 h-2 rounded-full bg-slate-700"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let count = 0;
        const btn = document.getElementById('publishBtn');
        const logs = document.getElementById('logs');

        function toggle(el) {
            el.classList.toggle('active-card');
            const dot = el.querySelector('.dot');
            if(el.classList.contains('active-card')) {
                dot.classList.replace('bg-slate-700', 'bg-indigo-400');
                count++;
            } else {
                dot.classList.replace('bg-indigo-400', 'bg-slate-700');
                count--;
            }
            btn.querySelector('span').innerText = `Blast to ${count} Platforms`;
            gsap.from(dot, { scale: 2, opacity: 0, duration: 0.3 });
        }

        btn.onclick = async () => {
            if(count === 0) return alert('Select a platform!');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Processing...';
            logs.innerHTML = '';
            
            const active = document.querySelectorAll('.active-card');
            for(let card of active) {
                const name = card.querySelector('div.flex-1').innerText;
                const log = document.createElement('div');
                log.className = 'glass p-4 rounded-xl flex justify-between items-center border-l-4 border-l-indigo-500 opacity-0 translate-x-4';
                log.innerHTML = `<span class="font-bold text-sm">Broadcasting to ${name}...</span><i class="fas fa-check-circle text-green-400 opacity-0"></i>`;
                logs.appendChild(log);
                gsap.to(log, { opacity: 1, x: 0, duration: 0.5 });
                await new Promise(r => setTimeout(r, 800));
                log.classList.replace('border-l-indigo-500', 'border-l-green-500');
                gsap.to(log.querySelector('i'), { opacity: 1, duration: 0.3 });
            }
            btn.innerHTML = '<i class="fas fa-check-double text-green-400"></i> Done!';
            setTimeout(() => { btn.disabled = false; btn.innerHTML = `<i class="fas fa-bolt"></i> <span>Blast to ${count} Platforms</span>`; }, 3000);
        };

        gsap.from('.glass', { opacity: 0, y: 30, duration: 0.8, stagger: 0.1, ease: "power2.out" });
    </script>
</body>
</html>
